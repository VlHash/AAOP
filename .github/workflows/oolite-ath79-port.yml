name: Oolite v5.2 ath79 port lab

on:
  workflow_dispatch:
    inputs:
      openwrt_ref:
        description: "Official OpenWrt branch or tag"
        required: true
        default: "v25.12.5"
        type: string
      prepare_toolchain_before_ssh:
        description: "Build and validate host tools plus the MIPS toolchain before SSH"
        required: true
        default: true
        type: boolean
      enable_ssh:
        description: "Expose standard OpenSSH through an OpenFrp TCP tunnel"
        required: true
        default: true
        type: boolean
      openfrp_endpoint:
        description: "OpenFrp node address shown in the tunnel details"
        required: true
        default: "replace-with-node-address"
        type: string
      openfrp_remote_port:
        description: "OpenFrp remote TCP port shown in the tunnel details"
        required: true
        default: "0"
        type: string
      build_after_ssh:
        description: "Run the target/linux validation build after SSH"
        required: true
        default: true
        type: boolean
      full_image_after_target:
        description: "Run a complete firmware build after target/linux succeeds"
        required: true
        default: false
        type: boolean
      device_config_symbol:
        description: "Target device Kconfig symbol"
        required: true
        default: "CONFIG_TARGET_ath79_generic_DEVICE_gainstrong_oolite-v5-2"
        type: string
      save_heavy_build_state:
        description: "Archive selected build_dir/staging_dir state (very large)"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: oolite-ath79-${{ github.ref }}
  cancel-in-progress: false

env:
  DEBIAN_FRONTEND: noninteractive
  CONTROLLER_DIR: ${{ github.workspace }}/controller
  OPENWRT_DIR: ${{ github.workspace }}/openwrt
  EVIDENCE_DIR: ${{ github.workspace }}/evidence
  STATE_DIR: ${{ github.workspace }}/port-state
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  VENDOR_COMMIT: 8c64824576598117958691853de68bf4dcfc3c06

jobs:
  port-and-build:
    name: Prepare, SSH, validate and export
    runs-on: ubuntu-24.04
    timeout-minutes: 355

    steps:
      - name: Check out controller repository
        uses: actions/checkout@v4.2.2
        with:
          path: controller
          fetch-depth: 1
          persist-credentials: false

      - name: Record run metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          safe_ref="$(printf '%s' '${{ inputs.openwrt_ref }}' | tr '/: ' '___')"
          echo "safe_ref=${safe_ref}" >> "$GITHUB_OUTPUT"

          mkdir -p "$EVIDENCE_DIR" "$STATE_DIR/logs" "$STATE_DIR/config" \
            "$STATE_DIR/source" "$STATE_DIR/reuse/port/patches"

          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "actor=${GITHUB_ACTOR}"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "openwrt_ref=${{ inputs.openwrt_ref }}"
            echo "vendor_commit=${VENDOR_COMMIT}"
            date -u +"started_utc=%Y-%m-%dT%H:%M:%SZ"
          } | tee "$STATE_DIR/run-metadata.txt"

      - name: Reclaim runner disk space
        shell: bash
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true
          sudo docker system prune --all --force --volumes || true
          df -h

      - name: Install OpenWrt and SSH dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            asciidoc autoconf automake autopoint bc binutils bison build-essential \
            bzip2 ccache clang cmake curl device-tree-compiler diffutils file flex \
            g++ g++-multilib gawk gcc gcc-multilib gettext git help2man jq \
            libelf-dev liblzma-dev libncurses-dev libssl-dev libtool-bin \
            libxml2-utils libxslt1-dev make mtd-utils ninja-build openssh-server \
            patch pkg-config python3 python3-dev python3-pip python3-setuptools \
            python3-pyelftools rsync screen sharutils subversion swig tar texinfo \
            time tmux tree u-boot-tools unzip uuid-runtime wget xxd xz-utils \
            zlib1g-dev zstd
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          unset SED GREP_OPTIONS
          gcc --version | head -1
          python3 --version
          df -h

      - name: Fetch official OpenWrt source
        shell: bash
        run: |
          set -euo pipefail
          git init "$OPENWRT_DIR"
          git -C "$OPENWRT_DIR" remote add origin https://github.com/openwrt/openwrt.git
          git -C "$OPENWRT_DIR" fetch --depth=1 origin "${{ inputs.openwrt_ref }}"
          git -C "$OPENWRT_DIR" checkout --detach FETCH_HEAD
          git -C "$OPENWRT_DIR" switch -c port/oolite-v5.2-ath79
          git -C "$OPENWRT_DIR" config user.name "Oolite Port Action"
          git -C "$OPENWRT_DIR" config user.email "oolite-port-action@users.noreply.github.com"
          git -C "$OPENWRT_DIR" rev-parse HEAD | tee "$STATE_DIR/openwrt-commit.txt"
          git -C "$OPENWRT_DIR" status --short --branch

      - name: Restore downloads and ccache
        uses: actions/cache@v4.2.3
        with:
          path: |
            ${{ env.OPENWRT_DIR }}/dl
            ${{ env.CCACHE_DIR }}
          key: oolite-downloads-${{ runner.os }}-${{ runner.arch }}-${{ steps.meta.outputs.safe_ref }}-${{ hashFiles('controller/port/config.seed', 'controller/port/patches/**', 'controller/port/files/**') }}
          restore-keys: |
            oolite-downloads-${{ runner.os }}-${{ runner.arch }}-${{ steps.meta.outputs.safe_ref }}-
            oolite-downloads-${{ runner.os }}-${{ runner.arch }}-

      - name: Restore host tools and MIPS toolchain cache
        id: toolchain-cache
        if: ${{ inputs.prepare_toolchain_before_ssh }}
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.OPENWRT_DIR }}/staging_dir/host
            ${{ env.OPENWRT_DIR }}/staging_dir/hostpkg
            ${{ env.OPENWRT_DIR }}/staging_dir/toolchain-*
            ${{ env.OPENWRT_DIR }}/build_dir/host
            ${{ env.OPENWRT_DIR }}/build_dir/hostpkg
            ${{ env.OPENWRT_DIR }}/build_dir/toolchain-*
            ${{ env.OPENWRT_DIR }}/tmp/stage-tools
            ${{ env.OPENWRT_DIR }}/tmp/stage-toolchain
          key: oolite-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ steps.meta.outputs.safe_ref }}-${{ hashFiles('openwrt/tools/**/Makefile', 'openwrt/toolchain/**/Makefile', 'openwrt/include/**', 'controller/port/config.seed') }}
          restore-keys: |
            oolite-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ steps.meta.outputs.safe_ref }}-

      - name: Collect vendor and ath79 reference evidence
        shell: bash
        run: |
          set -euo pipefail

          vendor_raw="https://raw.githubusercontent.com/GainStrongService/openwrt/${VENDOR_COMMIT}"
          vendor_commit_url="https://github.com/GainStrongService/openwrt/commit/${VENDOR_COMMIT}.patch"

          mkdir -p "$EVIDENCE_DIR/vendor-ar71xx" "$EVIDENCE_DIR/reference-ath79"

          curl --fail --location --retry 4 \
            "$vendor_commit_url" \
            --output "$EVIDENCE_DIR/vendor-ar71xx/0001-ar71xx-add-oolite-v5.2.patch"

          files=(
            "target/linux/ar71xx/files/arch/mips/ath79/mach-gs-oolite-v5-2.c"
            "target/linux/ar71xx/image/common-tp-link.mk"
            "target/linux/ar71xx/image/generic.mk"
            "target/linux/ar71xx/base-files/etc/board.d/02_network"
            "target/linux/ar71xx/base-files/etc/hotplug.d/firmware/11-ath10k-caldata"
            "target/linux/ar71xx/base-files/lib/upgrade/platform.sh"
          )

          for rel in "${files[@]}"; do
            dst="$EVIDENCE_DIR/vendor-ar71xx/$rel"
            mkdir -p "$(dirname "$dst")"
            curl --fail --location --retry 4 \
              "$vendor_raw/$rel" \
              --output "$dst"
          done

          refs=(
            "target/linux/ath79/dts/qca953x.dtsi"
            "target/linux/ath79/dts/qca9531_qxwlan_e600g.dtsi"
            "target/linux/ath79/dts/qca9531_qxwlan_e600gac-v2-16m.dts"
            "target/linux/ath79/dts/qca9531_comfast_cf-ew72.dts"
            "target/linux/ath79/dts/qca9531_tplink_tl-wr902ac-v1.dts"
            "target/linux/ath79/image/common-tp-link.mk"
            "target/linux/ath79/image/generic.mk"
            "target/linux/ath79/image/generic-tp-link.mk"
          )

          for rel in "${refs[@]}"; do
            if [[ -f "$OPENWRT_DIR/$rel" ]]; then
              dst="$EVIDENCE_DIR/reference-ath79/$rel"
              mkdir -p "$(dirname "$dst")"
              cp -a "$OPENWRT_DIR/$rel" "$dst"
            fi
          done

          grep -RInE \
            'oolite-v5\.2|OOLITE-V5-2|0x3C00010B|0x5000|0x1000|ART|ath10k' \
            "$EVIDENCE_DIR/vendor-ar71xx" \
            > "$EVIDENCE_DIR/vendor-ar71xx/key-facts.txt" || true

      - name: Apply persistent port files and patches
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [[ -d "$CONTROLLER_DIR/port/files" ]]; then
            rsync -a --exclude '.gitkeep' \
              "$CONTROLLER_DIR/port/files/" "$OPENWRT_DIR/"
          fi

          for patch in "$CONTROLLER_DIR"/port/patches/*.patch; do
            echo "Checking patch: $patch"
            if git -C "$OPENWRT_DIR" apply --check "$patch"; then
              git -C "$OPENWRT_DIR" apply "$patch"
            elif git -C "$OPENWRT_DIR" apply --reverse --check "$patch"; then
              echo "Patch is already applied: $patch"
            else
              echo "::error::Patch cannot be applied cleanly: $patch"
              exit 1
            fi
          done

      - name: Update and install feeds
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -euo pipefail
          ./scripts/feeds update -a 2>&1 | tee "$STATE_DIR/logs/feeds-update.log"
          ./scripts/feeds install -a 2>&1 | tee "$STATE_DIR/logs/feeds-install.log"

      - name: Create baseline ath79 configuration
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -euo pipefail

          cat > .config <<'CONFIG'
          CONFIG_TARGET_ath79=y
          CONFIG_TARGET_ath79_generic=y
          CONFIG_TARGET_ROOTFS_INITRAMFS=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_DEVEL=y
          CONFIG_BUILD_LOG=y
          CONFIG_CCACHE=y
          CONFIG

          if [[ -f "$CONTROLLER_DIR/port/config.seed" ]]; then
            cat "$CONTROLLER_DIR/port/config.seed" >> .config
          fi

          make defconfig
          ./scripts/diffconfig.sh | tee "$STATE_DIR/config/baseline.diffconfig"

      - name: Prepare persistent SSH shell environment
        shell: bash
        run: |
          set -euo pipefail

          cat > "$HOME/.openwrt-action-env" <<EOF
          export GITHUB_WORKSPACE="$GITHUB_WORKSPACE"
          export CONTROLLER_DIR="$CONTROLLER_DIR"
          export OPENWRT_DIR="$OPENWRT_DIR"
          export EVIDENCE_DIR="$EVIDENCE_DIR"
          export STATE_DIR="$STATE_DIR"
          export CCACHE_DIR="$CCACHE_DIR"
          export LC_ALL=C
          export LANG=C

          owrt() {
            cd "\$OPENWRT_DIR"
          }

          owrt-env() {
            printf '%-20s %s\n' \
              GITHUB_WORKSPACE "\$GITHUB_WORKSPACE" \
              OPENWRT_DIR "\$OPENWRT_DIR" \
              EVIDENCE_DIR "\$EVIDENCE_DIR" \
              STATE_DIR "\$STATE_DIR" \
              CCACHE_DIR "\$CCACHE_DIR"
          }

          port-status() {
            cd "\$OPENWRT_DIR" || return
            git status --short --branch
            printf '\nSelected target:\n'
            grep -E 'CONFIG_TARGET_ath79|gainstrong_oolite|ROOTFS_INITRAMFS' .config || true
          }
          EOF

          source_line='[ -f "$HOME/.openwrt-action-env" ] && . "$HOME/.openwrt-action-env"'
          grep -qxF "$source_line" "$HOME/.bashrc" || echo "$source_line" >> "$HOME/.bashrc"
          grep -qxF "$source_line" "$HOME/.profile" || echo "$source_line" >> "$HOME/.profile"

          sudo tee /usr/local/sbin/finish-porting >/dev/null <<'FINISH'
          #!/usr/bin/env bash
          set -euo pipefail
          touch /continue
          echo "Porting session released. The Action will close FRP/SSH and continue."
          FINISH
          sudo chmod 0755 /usr/local/sbin/finish-porting

          . "$HOME/.openwrt-action-env"
          owrt-env

      - name: Write interactive porting notes
        shell: bash
        run: |
          set -euo pipefail

          cat > "$OPENWRT_DIR/PORTING-NOTES.txt" <<'NOTES'
          Oolite v5.2 ath79 interactive workspace
          =======================================

          Reconnect-safe shell:
            source "$HOME/.openwrt-action-env"
            owrt
            owrt-env
            port-status

          Current automated stage:
            1. Apply controller/port/files and controller/port/patches
            2. Install feeds
            3. Prepare ath79/generic baseline configuration
            4. Build and validate OpenWrt host tools
            5. Build and validate mips_24kc musl toolchain
            6. Open standard SSH through OpenFrp
            7. Compile target/linux after SSH
            8. Optionally build complete firmware
            9. Export a ready-to-reuse binary patch and config seed

          High-confidence hardware facts:
            SoC: QCA9531
            PCIe radio: QCA9887
            flash: 16 MiB SPI NOR
            WAN MAC: ART + 0
            LAN MAC: ART + 6
            QCA9531 WMAC calibration: ART + 0x1000
            QCA9887 calibration: ART + 0x5000, length 0x844
            reset button: GPIO 17, active low
            development-board system LED: GPIO 13, active high
            TP-Link v1 HWID: 0x3C00010B
            old image profile: tplink-16mlzma

          Current first-pass source files:
            target/linux/ath79/dts/qca9531_gainstrong_oolite-v5-2.dts
            target/linux/ath79/image/generic.mk

          Do not add final network defaults or flash a persistent image until:
            - real /proc/mtd is verified
            - serial/U-Boot recovery is verified
            - initramfs boots from RAM
            - physical LAN/WAN mapping is tested

          Finish the interactive stage:
            sudo finish-porting
          NOTES

          grep -qxF '/PORTING-NOTES.txt' "$OPENWRT_DIR/.git/info/exclude" ||             echo '/PORTING-NOTES.txt' >> "$OPENWRT_DIR/.git/info/exclude"

          cat "$OPENWRT_DIR/PORTING-NOTES.txt"

      - name: Build and validate host tools
        if: ${{ inputs.prepare_toolchain_before_ssh }}
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -euo pipefail
          set -o pipefail

          valid_tools=false
          if [[ -x staging_dir/host/bin/m4 ]] &&
             staging_dir/host/bin/m4 --version >/dev/null 2>&1; then
            valid_tools=true
          fi

          if [[ "$valid_tools" != true ]]; then
            echo "Host tools cache is absent or invalid; rebuilding."
            rm -rf build_dir/host build_dir/hostpkg \
              staging_dir/host staging_dir/hostpkg tmp/stage-tools

            if ! make tools/install -j"$(nproc)" V=s \
              2>&1 | tee "$STATE_DIR/logs/tools-install-parallel.log"; then
              echo "Parallel tools build failed; retrying serially."
              make tools/install -j1 V=sc \
                2>&1 | tee "$STATE_DIR/logs/tools-install-serial.log"
            fi
          else
            echo "Validated cached host tools."
          fi

          test -x staging_dir/host/bin/m4
          staging_dir/host/bin/m4 --version | head \
            | tee "$STATE_DIR/tools-validation.txt"

      - name: Build and validate MIPS toolchain
        if: ${{ inputs.prepare_toolchain_before_ssh }}
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -euo pipefail
          set -o pipefail

          find_gcc() {
            find staging_dir/toolchain-* \
              \( -type f -o -type l \) \
              -name 'mips-openwrt-linux-musl-gcc' \
              -print -quit 2>/dev/null
          }

          toolchain_gcc="$(find_gcc || true)"
          valid_toolchain=false

          if [[ -n "$toolchain_gcc" ]] &&
             [[ -x "$toolchain_gcc" ]] &&
             "$toolchain_gcc" --version >/dev/null 2>&1; then
            valid_toolchain=true
          fi

          if [[ "$valid_toolchain" != true ]]; then
            echo "MIPS toolchain cache is absent or invalid; rebuilding."
            rm -rf build_dir/toolchain-mips_24kc* \
              staging_dir/toolchain-mips_24kc* tmp/stage-toolchain

            if ! make toolchain/install -j"$(nproc)" V=s \
              2>&1 | tee "$STATE_DIR/logs/toolchain-install-parallel.log"; then
              echo "Parallel toolchain build failed; retrying serially."
              make toolchain/install -j1 V=sc \
                2>&1 | tee "$STATE_DIR/logs/toolchain-install-serial.log"
            fi

            toolchain_gcc="$(find_gcc || true)"
          else
            echo "Validated cached MIPS toolchain."
          fi

          test -n "$toolchain_gcc"
          test -x "$toolchain_gcc"
          "$toolchain_gcc" --version | head \
            | tee "$STATE_DIR/toolchain-validation.txt"
          echo "toolchain_gcc=$toolchain_gcc" \
            | tee -a "$STATE_DIR/toolchain-validation.txt"

      - name: Save validated host tools and toolchain cache
        if: ${{ inputs.prepare_toolchain_before_ssh && steps.toolchain-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.OPENWRT_DIR }}/staging_dir/host
            ${{ env.OPENWRT_DIR }}/staging_dir/hostpkg
            ${{ env.OPENWRT_DIR }}/staging_dir/toolchain-*
            ${{ env.OPENWRT_DIR }}/build_dir/host
            ${{ env.OPENWRT_DIR }}/build_dir/hostpkg
            ${{ env.OPENWRT_DIR }}/build_dir/toolchain-*
            ${{ env.OPENWRT_DIR }}/tmp/stage-tools
            ${{ env.OPENWRT_DIR }}/tmp/stage-toolchain
          key: ${{ steps.toolchain-cache.outputs.cache-primary-key }}

      - name: Configure key-only OpenSSH
        if: ${{ inputs.enable_ssh }}
        shell: bash
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail

          ssh_user="$(id -un)"
          ssh_group="$(id -gn)"
          ssh_home="$(getent passwd "$ssh_user" | cut -d: -f6)"
          echo "SSH_LOGIN_USER=$ssh_user" >> "$GITHUB_ENV"

          key_file="$(mktemp)"
          if [[ -n "${SSH_PUBLIC_KEY:-}" ]]; then
            printf '%s\n' "$SSH_PUBLIC_KEY" > "$key_file"
          else
            curl --fail --location --retry 4 \
              "https://github.com/${GITHUB_ACTOR}.keys" \
              --output "$key_file"
          fi

          if ! grep -Eq \
            '^(ssh-ed25519|ssh-rsa|ecdsa-sha2-nistp(256|384|521)|sk-ssh-ed25519@openssh.com) ' \
            "$key_file"; then
            echo "::error::No valid SSH public key was found."
            exit 1
          fi

          sudo install -d -m 0700 -o "$ssh_user" -g "$ssh_group" \
            "${ssh_home}/.ssh"
          sudo install -m 0600 -o "$ssh_user" -g "$ssh_group" \
            "$key_file" "${ssh_home}/.ssh/authorized_keys"
          rm -f "$key_file"

          sudo install -d -m 0755 /run/sshd
          sudo ssh-keygen -A

          sudo tee /etc/ssh/sshd_config.d/90-openwrt-action.conf >/dev/null <<SSHD
          Port 22
          ListenAddress 0.0.0.0
          AddressFamily inet
          PermitRootLogin no
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          ChallengeResponseAuthentication no
          PubkeyAuthentication yes
          AuthenticationMethods publickey
          PermitEmptyPasswords no
          AllowAgentForwarding no
          AllowTcpForwarding no
          X11Forwarding no
          ClientAliveInterval 30
          ClientAliveCountMax 10
          TCPKeepAlive yes
          LogLevel VERBOSE
          AllowUsers ${ssh_user}
          SSHD

          sudo /usr/sbin/sshd -t
          sudo systemctl restart ssh
          sudo ss -lntp | grep ':22 ' | tee "$STATE_DIR/ssh-listener.txt"

      - name: Start OpenFrp TCP tunnel
        if: ${{ inputs.enable_ssh }}
        shell: bash
        env:
          OPENFRP_TOKEN: ${{ secrets.OPENFRP_TOKEN }}
          OPENFRP_TUNNEL_ID: ${{ secrets.OPENFRP_TUNNEL_ID }}
        run: |
          set -euo pipefail

          if [[ -z "${OPENFRP_TOKEN:-}" || -z "${OPENFRP_TUNNEL_ID:-}" ]]; then
            echo "::error::Set OPENFRP_TOKEN and OPENFRP_TUNNEL_ID as Actions secrets."
            exit 1
          fi

          endpoint='${{ inputs.openfrp_endpoint }}'
          remote_port='${{ inputs.openfrp_remote_port }}'

          if [[ "$endpoint" == "replace-with-node-address" || "$remote_port" == "0" ]]; then
            echo "::error::Enter the OpenFrp node address and remote TCP port."
            exit 1
          fi

          docker pull openfrp/frpc:latest
          docker rm --force openfrp-ssh >/dev/null 2>&1 || true

          docker run --detach \
            --name openfrp-ssh \
            --network host \
            openfrp/frpc:latest \
            -u "$OPENFRP_TOKEN" \
            -p "$OPENFRP_TUNNEL_ID"

          sleep 8
          docker ps --format '{{.Names}}' | grep -Fxq openfrp-ssh

          {
            echo "endpoint=${endpoint}"
            echo "remote_port=${remote_port}"
            echo "connect_command=ssh -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o IdentitiesOnly=yes -p ${remote_port} ${SSH_LOGIN_USER}@${endpoint}"
          } | tee "$STATE_DIR/openfrp-connection.txt"

          {
            echo "## OpenFrp SSH"
            echo
            echo '```bash'
            echo "ssh -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o IdentitiesOnly=yes -p ${remote_port} ${SSH_LOGIN_USER}@${endpoint}"
            echo '```'
            echo
            echo "Reconnect-safe commands: \`owrt\`, \`owrt-env\`, \`port-status\`."
            echo
            echo "Finish with: \`sudo finish-porting\`."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=OpenFrp SSH::ssh -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o IdentitiesOnly=yes -p ${remote_port} ${SSH_LOGIN_USER}@${endpoint}"

      - name: Wait for interactive porting to finish
        if: ${{ inputs.enable_ssh }}
        timeout-minutes: 240
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for /continue. Run: sudo finish-porting"
          while [[ ! -e /continue ]]; do
            if ! docker ps --format '{{.Names}}' | grep -Fxq openfrp-ssh; then
              docker logs openfrp-ssh || true
              echo "::error::The OpenFrp client stopped unexpectedly."
              exit 1
            fi

            if ! sudo ss -lnt | grep -qE 'LISTEN.+:22[[:space:]]'; then
              echo "::error::sshd is no longer listening on TCP port 22."
              exit 1
            fi

            sleep 15
          done

          date -u +"released_utc=%Y-%m-%dT%H:%M:%SZ" \
            | tee -a "$STATE_DIR/run-metadata.txt"

      - name: Stop OpenFrp and public SSH
        if: ${{ always() && inputs.enable_ssh }}
        shell: bash
        run: |
          set +e
          docker logs openfrp-ssh > "$STATE_DIR/logs/openfrp-complete.log" 2>&1
          docker rm --force openfrp-ssh
          sudo systemctl stop ssh
          sudo rm -f /continue
          echo "OpenFrp tunnel and sshd stopped."

      - name: Select and verify the Oolite device
        if: ${{ inputs.build_after_ssh }}
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -euo pipefail

          symbol="${{ inputs.device_config_symbol }}"
          grep -v "^${symbol}=" .config > .config.new || true
          mv .config.new .config
          echo "${symbol}=y" >> .config
          make defconfig

          if ! grep -Fxq "${symbol}=y" .config; then
            echo "::error::Device symbol was not accepted: ${symbol}"
            echo "Place the current run patch under controller/port/patches."
            exit 2
          fi

          git diff --check
          ./scripts/diffconfig.sh | tee "$STATE_DIR/config/pre-target-build.diffconfig"

          test -f target/linux/ath79/dts/qca9531_gainstrong_oolite-v5-2.dts
          grep -q '^define Device/gainstrong_oolite-v5-2$' \
            target/linux/ath79/image/generic.mk

      - name: Compile target/linux and DTS
        id: target_build
        if: ${{ inputs.build_after_ssh }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set +e
          set -o pipefail

          make target/linux/clean V=s \
            2>&1 | tee "$STATE_DIR/logs/target-linux-clean.log"

          make target/linux/compile -j"$(nproc)" V=s \
            2>&1 | tee "$STATE_DIR/logs/target-linux-parallel.log"
          rc=${PIPESTATUS[0]}

          if [[ "$rc" -ne 0 ]]; then
            echo "Parallel target build failed; retrying serially."
            make target/linux/compile -j1 V=sc \
              2>&1 | tee "$STATE_DIR/logs/target-linux-serial.log"
            rc=${PIPESTATUS[0]}
          fi

          echo "$rc" | tee "$STATE_DIR/target-build-exit-code.txt"
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit "$rc"

      - name: Download remaining package sources
        if: ${{ inputs.build_after_ssh && inputs.full_image_after_target && steps.target_build.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -o pipefail
          find dl -type f -size -1024c -delete 2>/dev/null || true
          make download -j"$(nproc)" V=s \
            2>&1 | tee "$STATE_DIR/logs/download.log"

      - name: Build complete Oolite firmware
        id: full_build
        if: ${{ inputs.build_after_ssh && inputs.full_image_after_target && steps.target_build.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set +e
          set -o pipefail

          make -j"$(nproc)" V=s \
            2>&1 | tee "$STATE_DIR/logs/full-build-parallel.log"
          rc=${PIPESTATUS[0]}

          if [[ "$rc" -ne 0 ]]; then
            echo "Parallel full build failed; retrying serially."
            make -j1 V=sc \
              2>&1 | tee "$STATE_DIR/logs/full-build-serial.log"
            rc=${PIPESTATUS[0]}
          fi

          echo "$rc" | tee "$STATE_DIR/full-build-exit-code.txt"
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          exit "$rc"

      - name: Export reusable port state
        if: ${{ always() }}
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -euo pipefail

          mkdir -p "$STATE_DIR/source/individual-files" \
            "$STATE_DIR/config" "$STATE_DIR/logs" \
            "$STATE_DIR/reuse/port/patches"

          git status --short --branch | tee "$STATE_DIR/source/git-status.txt"
          git diff --stat | tee "$STATE_DIR/source/git-diff-stat.txt"
          git diff --check | tee "$STATE_DIR/source/git-diff-check.txt" || true
          : > "$STATE_DIR/source/untracked-files.txt"
          while IFS= read -r -d '' file; do
            [[ "$file" == "PORTING-NOTES.txt" ]] && continue
            printf '%s\n' "$file" >> "$STATE_DIR/source/untracked-files.txt"
            git add -N -- "$file"
          done < <(git ls-files -z --others --exclude-standard)

          git diff --binary \
            > "$STATE_DIR/source/oolite-ath79-complete.patch"
          cp "$STATE_DIR/source/oolite-ath79-complete.patch" \
            "$STATE_DIR/reuse/port/patches/0001-oolite-ath79-current.patch"

          cp -a .config "$STATE_DIR/config/full.config" 2>/dev/null || true
          ./scripts/diffconfig.sh \
            > "$STATE_DIR/config/diffconfig.txt" 2>/dev/null || true
          cp "$STATE_DIR/config/diffconfig.txt" \
            "$STATE_DIR/reuse/port/config.seed" 2>/dev/null || true

          for file in \
            target/linux/ath79/dts/qca9531_gainstrong_oolite-v5-2.dts \
            target/linux/ath79/image/generic.mk \
            PORTING-NOTES.txt; do
            if [[ -f "$file" ]]; then
              mkdir -p "$STATE_DIR/source/individual-files/$(dirname "$file")"
              cp -a "$file" "$STATE_DIR/source/individual-files/$file"
            fi
          done

          cat > "$STATE_DIR/reuse/README.txt" <<'README'
          Copy the contents of this reuse directory into the controller
          repository root:

            port/patches/0001-oolite-ath79-current.patch
            port/config.seed

          The next Action run will apply the patch before feeds, toolchain
          preparation and SSH.
          README

          if [[ -d logs ]]; then
            tar --zstd -cf "$STATE_DIR/logs/openwrt-build-logs.tar.zst" logs
          fi

          if [[ -d bin/targets/ath79/generic ]]; then
            find bin/targets/ath79/generic -maxdepth 2 -type f \
              -printf '%P\t%s bytes\n' \
              | sort > "$STATE_DIR/firmware-files.txt"
          fi

          cp -a "$EVIDENCE_DIR" "$STATE_DIR/evidence"
          screen -ls > "$STATE_DIR/screen-sessions.txt" 2>&1 || true
          df -h > "$STATE_DIR/disk-usage.txt"
          du -sh "$OPENWRT_DIR" "$STATE_DIR" 2>/dev/null \
            > "$STATE_DIR/directory-sizes.txt" || true

      - name: Archive selected heavy build state
        if: ${{ always() && inputs.save_heavy_build_state }}
        shell: bash
        working-directory: ${{ env.OPENWRT_DIR }}
        run: |
          set -euo pipefail

          heavy_paths=()
          for path in \
            staging_dir/host \
            staging_dir/hostpkg \
            staging_dir/toolchain-* \
            build_dir/host \
            build_dir/hostpkg \
            build_dir/toolchain-* \
            tmp/stage-tools \
            tmp/stage-toolchain; do
            for match in $path; do
              [[ -e "$match" ]] && heavy_paths+=("$match")
            done
          done

          if (( ${#heavy_paths[@]} )); then
            tar --zstd -cf "$STATE_DIR/heavy-build-state.tar.zst" \
              "${heavy_paths[@]}"
          fi

      - name: Upload migration state
        if: ${{ always() }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: oolite-port-state-${{ steps.meta.outputs.safe_ref }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.STATE_DIR }}
          if-no-files-found: error
          include-hidden-files: true
          compression-level: 6
          retention-days: 21

      - name: Upload built firmware
        if: ${{ always() && hashFiles('openwrt/bin/targets/ath79/generic/**') != '' }}
        uses: actions/upload-artifact@v4.6.2
        with:
          name: oolite-firmware-${{ steps.meta.outputs.safe_ref }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.OPENWRT_DIR }}/bin/targets/ath79/generic
            ${{ env.OPENWRT_DIR }}/bin/packages
          if-no-files-found: warn
          compression-level: 0
          retention-days: 21

      - name: Write job summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "# Oolite v5.2 ath79 port run"
            echo
            echo "- OpenWrt ref: \`${{ inputs.openwrt_ref }}\`"
            echo "- OpenWrt commit: \`$(cat "$STATE_DIR/openwrt-commit.txt" 2>/dev/null || echo unknown)\`"
            echo "- Toolchain cache restored: \`${{ steps.toolchain-cache.outputs.cache-hit || 'not-requested' }}\`"
            echo "- SSH enabled: \`${{ inputs.enable_ssh }}\`"
            echo "- SSH transport: \`OpenSSH over OpenFrp TCP\`"
            echo "- Device symbol: \`${{ inputs.device_config_symbol }}\`"
            echo "- target/linux outcome: \`${{ steps.target_build.outcome }}\`"
            echo "- Full image requested: \`${{ inputs.full_image_after_target }}\`"
            echo "- Full build outcome: \`${{ steps.full_build.outcome }}\`"
            echo
            echo "Download the **oolite-port-state** artifact."
            echo "Its \`reuse/port\` directory is ready to copy into the controller"
            echo "repository for the next run."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when requested validation failed
        if: ${{ always() && inputs.build_after_ssh && steps.target_build.outcome == 'failure' }}
        shell: bash
        run: |
          echo "::error::target/linux validation failed; state and logs were uploaded."
          exit 1

      - name: Fail when requested full build failed
        if: ${{ always() && inputs.full_image_after_target && steps.target_build.outcome == 'success' && steps.full_build.outcome == 'failure' }}
        shell: bash
        run: |
          echo "::error::Full firmware build failed; state and logs were uploaded."
          exit 1
